name: Release

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  release:
    name: Release
    environment: release

    runs-on: ubuntu-latest

    timeout-minutes: 5

    permissions:
      contents: write # required to create releases and tags
      pull-requests: write # required to create and update release PRs

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup release helper
        id: release-helper
        uses: ./setup-github-app-user-bot
        with:
          app-id: ${{ vars.RELEASE_HELPER_APP_ID }}
          private-key: ${{ secrets.RELEASE_HELPER_PRIVATE_KEY }}

      - name: Configure git user for GitHub App
        run: |
          git config --global user.name '${BOT_NAME}'
          git config --global user.email '${BOT_EMAIL}'
        env:
          BOT_NAME: ${{ steps.release-helper.outputs.bot-name }}
          BOT_EMAIL: ${{ steps.release-helper.outputs.bot-email }}

      - name: Release please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ steps.release-helper.outputs.token }}
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
